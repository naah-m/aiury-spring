<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: base('Dashboard', 'dashboard', ~{::content})}">
<th:block th:fragment="content">
    <section class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h1 class="mb-1">Dashboard</h1>
            <p class="text-secondary mb-0">Visao consolidada do seu perfil no sistema de atendimentos Aiury.</p>
        </div>
        <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-outline-primary px-4" sec:authorize="hasRole('ADMIN')" th:href="@{/app/usuarios}">Gerenciar usuarios</a>
            <a class="btn btn-outline-primary px-4" sec:authorize="hasRole('ADMIN')" th:href="@{/app/ajudantes}">Gerenciar ajudantes</a>
            <a class="btn btn-primary px-4" th:href="@{/app/chats}" sec:authorize="hasAnyRole('ADMIN','USUARIO','AJUDANTE')">Ir para chats</a>
        </div>
    </section>

    <div th:replace="~{fragments/alerts :: feedback(${mensagemSucesso}, ${mensagemErro})}"></div>

    <section class="row g-3 g-lg-4">
        <div class="col-sm-6 col-xl-3">
            <article class="metric-card rounded-4 p-4 h-100">
                <h2 class="h6 text-uppercase text-secondary mb-2">Usuarios</h2>
                <p class="display-6 fw-bold mb-0" th:text="${summary.totalUsuarios}">0</p>
            </article>
        </div>
        <div class="col-sm-6 col-xl-3">
            <article class="metric-card rounded-4 p-4 h-100">
                <h2 class="h6 text-uppercase text-secondary mb-2">Ajudantes</h2>
                <p class="display-6 fw-bold mb-0" th:text="${summary.totalAjudantes}">0</p>
            </article>
        </div>
        <div class="col-sm-6 col-xl-3">
            <article class="metric-card rounded-4 p-4 h-100">
                <h2 class="h6 text-uppercase text-secondary mb-2">Chats</h2>
                <p class="display-6 fw-bold mb-0" th:text="${summary.totalChats}">0</p>
            </article>
        </div>
        <div class="col-sm-6 col-xl-3">
            <article class="metric-card rounded-4 p-4 h-100">
                <h2 class="h6 text-uppercase text-secondary mb-2">Mensagens</h2>
                <p class="display-6 fw-bold mb-0" th:text="${summary.totalMensagens}">0</p>
            </article>
        </div>
    </section>
</th:block>
</html>
