<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: base('Cadastro de usuario', 'usuarios', ~{::content})}">
<th:block th:fragment="content">
    <section class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h1 class="mb-1" th:text="${modoEdicao} ? 'Editar usuario' : 'Novo usuario'">Novo usuario</h1>
            <p class="text-secondary mb-0"
               th:text="${modoEdicao} ? 'Atualize os dados do usuario selecionado.' : 'Preencha os dados abaixo para cadastrar um novo usuario no sistema.'">
                Preencha os dados abaixo para cadastrar um novo usuario no sistema.
            </p>
        </div>
        <a class="btn btn-outline-secondary px-4" th:href="@{/app/usuarios}">Voltar para lista</a>
    </section>

    <div th:replace="~{fragments/alerts :: feedback(${mensagemSucesso}, ${mensagemErro})}"></div>

    <div class="alert alert-warning border-0 shadow-sm"
         role="alert"
         th:if="${semCidades}">
        Nenhuma cidade cadastrada. Cadastre cidades antes de criar novos usuarios.
    </div>

    <section class="form-card rounded-4 p-3 p-lg-4">
        <form th:action="${modoEdicao} ? @{/app/usuarios/{id}(id=${usuarioId})} : @{/app/usuarios}"
              th:object="${usuarioForm}"
              method="post"
              class="row g-3">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="col-12" th:replace="~{fragments/form-errors :: summary('Revise os dados obrigatorios do cadastro.')}"></div>

            <div class="col-12 col-lg-6">
                <label for="nomeReal" class="form-label">Nome real</label>
                <input id="nomeReal" type="text" th:field="*{nomeReal}" maxlength="100" required class="form-control"
                       th:classappend="${#fields.hasErrors('nomeReal')} ? ' is-invalid' : ''">
                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nomeReal')}" th:errors="*{nomeReal}"></div>
            </div>

            <div class="col-12 col-lg-6">
                <label for="nomeAnonimo" class="form-label">Nome anonimo</label>
                <input id="nomeAnonimo" type="text" th:field="*{nomeAnonimo}" maxlength="50" class="form-control"
                       th:classappend="${#fields.hasErrors('nomeAnonimo')} ? ' is-invalid' : ''">
                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nomeAnonimo')}" th:errors="*{nomeAnonimo}"></div>
            </div>

            <div class="col-12 col-lg-4">
                <label for="dataNascimento" class="form-label">Data de nascimento</label>
                <input id="dataNascimento" type="date" th:field="*{dataNascimento}" required class="form-control"
                       th:classappend="${#fields.hasErrors('dataNascimento')} ? ' is-invalid' : ''">
                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('dataNascimento')}" th:errors="*{dataNascimento}"></div>
            </div>

            <div class="col-12 col-lg-4">
                <label for="celular" class="form-label">Celular</label>
                <input id="celular" type="text" th:field="*{celular}" maxlength="11" class="form-control"
                       th:classappend="${#fields.hasErrors('celular')} ? ' is-invalid' : ''">
                <div class="form-text">Informe apenas numeros, exemplo: 11999998888.</div>
                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('celular')}" th:errors="*{celular}"></div>
            </div>

            <div class="col-12 col-lg-4">
                <label for="senha" class="form-label" th:text="${modoEdicao} ? 'Senha (opcional)' : 'Senha'">Senha</label>
                <input id="senha"
                       type="password"
                       th:field="*{senha}"
                       minlength="8"
                       maxlength="255"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('senha')} ? ' is-invalid' : ''"
                       th:attr="required=${!modoEdicao}">
                <div class="form-text" th:if="${modoEdicao}">Preencha apenas se quiser trocar a senha atual.</div>
                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></div>
            </div>

            <div class="col-12">
                <label for="cidadeId" class="form-label">Cidade</label>
                <select id="cidadeId" th:field="*{cidadeId}" required class="form-select"
                        th:classappend="${#fields.hasErrors('cidadeId')} ? ' is-invalid' : ''">
                    <option value="">Selecione uma cidade</option>
                    <option th:each="cidade : ${cidades}"
                            th:value="${cidade.id}"
                            th:text="${cidade.nomeCidade + ' - ' + cidade.estado.uf}">
                    </option>
                </select>
                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('cidadeId')}" th:errors="*{cidadeId}"></div>
            </div>

            <div class="col-12 d-flex justify-content-end">
                <button type="submit"
                        class="btn btn-primary px-4"
                        th:disabled="${semCidades}"
                        th:text="${modoEdicao} ? 'Salvar alteracoes' : 'Salvar usuario'">
                    Salvar usuario
                </button>
            </div>
        </form>
    </section>
</th:block>
</html>
