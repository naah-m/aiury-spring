<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: base('Usuários', 'usuarios', ~{::content})}">
<th:block th:fragment="content">
    <section class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h1 class="mb-1">Usuários</h1>
            <p class="text-secondary mb-0">Consulta, filtros e acompanhamento dos usuários cadastrados na plataforma.</p>
        </div>
        <a class="btn btn-primary px-4" sec:authorize="hasRole('ADMIN')" th:href="@{/app/usuarios/novo}">Novo usuário</a>
    </section>

    <div th:replace="~{fragments/alerts :: feedback(${mensagemSucesso}, ${mensagemErro})}"></div>
    <section class="page-card rounded-4 p-3 p-lg-4 mb-4">
        <form class="row g-3 align-items-end" method="get" th:action="@{/app/usuarios}">
            <div class="col-12 col-lg-8">
                <label class="form-label" for="cidadeId">Filtrar por cidade</label>
                <select id="cidadeId" name="cidadeId" class="form-select">
                    <option value="">Todas</option>
                    <option th:each="cidade : ${cidades}"
                            th:value="${cidade.id}"
                            th:selected="${filtroCidadeId != null and filtroCidadeId == cidade.id}"
                            th:text="${cidade.nomeCidade + ' - ' + cidade.estado.uf}">
                    </option>
                </select>
            </div>
            <div class="col-12 col-lg-4 d-grid d-lg-flex justify-content-lg-end">
                <button type="submit" class="btn btn-outline-primary px-4">Aplicar filtro</button>
            </div>
        </form>
    </section>

    <section class="page-card rounded-4 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Nome real</th>
                    <th scope="col">Nome anônimo</th>
                    <th scope="col">Cidade</th>
                    <th scope="col">UF</th>
                    <th scope="col">Cadastro</th>
                    <th scope="col" class="text-end">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="7" class="text-center py-4">
                        <p class="mb-2">Nenhum usuário encontrado para o filtro informado.</p>
                        <div class="d-inline-flex gap-2 flex-wrap justify-content-center">
                            <a class="btn btn-sm btn-outline-secondary" th:if="${filtroCidadeId != null}" th:href="@{/app/usuarios}">
                                Limpar filtro
                            </a>
                            <a class="btn btn-sm btn-primary" sec:authorize="hasRole('ADMIN')" th:href="@{/app/usuarios/novo}">
                                Cadastrar usuário
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:each="usuario : ${usuarios}">
                    <td th:text="${usuario.id}">1</td>
                    <td th:text="${usuario.nomeReal}">Nome</td>
                    <td th:text="${usuario.nomeAnonimo != null and !#strings.isEmpty(usuario.nomeAnonimo) ? usuario.nomeAnonimo : '-'}">-</td>
                    <td th:text="${usuario.cidadeNome}">Cidade</td>
                    <td th:text="${usuario.estadoUf}">UF</td>
                    <td th:text="${usuario.dataCadastro != null ? #temporals.format(usuario.dataCadastro, 'dd/MM/yyyy') : '-'}">-</td>
                    <td class="text-end">
                        <div class="d-inline-flex gap-1" sec:authorize="hasRole('ADMIN')">
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/app/usuarios/{id}/editar(id=${usuario.id})}">
                                Editar
                            </a>
                            <form th:action="@{/app/usuarios/{id}/excluir(id=${usuario.id})}" method="post" class="d-inline">
                                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Deseja excluir este usuário? Esta ação não pode ser desfeita.');">
                                    Excluir
                                </button>
                            </form>
                        </div>
                        <span sec:authorize="!hasRole('ADMIN')" class="text-secondary">-</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</th:block>
</html>
