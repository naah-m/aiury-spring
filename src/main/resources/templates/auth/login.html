<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: base('Login', 'login', ~{::content})}">
<th:block th:fragment="content">
    <section class="auth-wrapper d-flex justify-content-center">
        <article class="auth-card rounded-4 p-4 p-lg-5">
            <h1 class="h3 fw-bold mb-2">Acesso ao painel</h1>
            <p class="text-secondary mb-4">Entre com suas credenciais para acessar a area administrativa do Aiury.</p>

            <div th:replace="~{fragments/alerts :: feedback(${param.logout != null ? 'Sessao encerrada com sucesso.' : null}, ${param.error != null ? 'Usuario ou senha invalidos.' : null})}"></div>

            <form th:action="@{/login}" method="post" class="d-grid gap-3">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div>
                    <label for="username" class="form-label">Usuario</label>
                    <input id="username" name="username" type="text" class="form-control form-control-lg" required autocomplete="username">
                </div>
                <div>
                    <label for="password" class="form-label">Senha</label>
                    <input id="password" name="password" type="password" class="form-control form-control-lg" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-lg mt-2">Entrar</button>
            </form>

            <div class="mt-4 border rounded-3 p-3 bg-light-subtle small">
                <p class="fw-semibold mb-2">Perfis de acesso (ambiente local)</p>
                <p class="mb-1"><strong>ADMIN:</strong> admin / admin123</p>
                <p class="mb-0"><strong>ATENDENTE:</strong> atendente / atendente123</p>
            </div>
        </article>
    </section>
</th:block>
</html>
