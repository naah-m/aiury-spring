<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: base('Erro', 'home', ~{::content})}">
<th:block th:fragment="content">
    <section class="error-card rounded-4 p-4 p-lg-5 text-center mx-auto">
        <p class="text-uppercase fw-semibold text-secondary mb-2">Erro de aplicacao</p>
        <h1 class="display-5 fw-bold mb-2" th:text="${status}">500</h1>
        <h2 class="h4 mb-3" th:text="${error}">Erro interno</h2>
        <p class="text-secondary mb-4" th:text="${message}">Nao foi possivel concluir a operacao.</p>
        <a class="btn btn-primary px-4" th:href="@{/}">Voltar ao inicio</a>
    </section>
</th:block>
</html>
