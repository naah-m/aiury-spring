<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="topbar" th:fragment="topbar(activePage)">
    <div class="topbar__brand">Aiury Sprint 3</div>
    <nav class="topbar__nav">
        <a th:href="@{/app}" th:classappend="${activePage == 'dashboard'} ? ' active' : ''">Dashboard</a>
        <a th:href="@{/app/usuarios}" th:classappend="${activePage == 'usuarios'} ? ' active' : ''">Usuarios</a>
        <a th:href="@{/swagger-ui.html}" target="_blank" rel="noopener">API Docs</a>
    </nav>
    <form th:action="@{/logout}" method="post" class="topbar__logout">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Sair</button>
    </form>
</header>
</body>
</html>
