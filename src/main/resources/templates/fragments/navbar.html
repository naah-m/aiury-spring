<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg app-navbar" th:fragment="navbar(activePage)">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" th:href="@{/}">Aiury</a>
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false"
                aria-label="Alternar navegacao">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-3 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${activePage == 'home'} ? ' active' : ''"
                       th:href="@{/}"
                       th:attr="aria-current=${activePage == 'home'} ? 'page' : null">Inicio</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link"
                       th:classappend="${activePage == 'dashboard'} ? ' active' : ''"
                       th:href="@{/app}"
                       th:attr="aria-current=${activePage == 'dashboard'} ? 'page' : null">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link"
                       th:classappend="${activePage == 'usuarios'} ? ' active' : ''"
                       th:href="@{/app/usuarios}"
                       th:attr="aria-current=${activePage == 'usuarios'} ? 'page' : null">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/swagger-ui.html}" target="_blank" rel="noopener">API Docs</a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-2">
                <span class="navbar-text text-white-50" sec:authorize="isAuthenticated()">
                    conectado como <strong class="text-white" sec:authentication="name">usuario</strong>
                </span>
                <a class="btn btn-light btn-sm px-3" sec:authorize="isAnonymous()" th:href="@{/login}">Entrar</a>
                <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="m-0">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-light btn-sm px-3">Sair</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
