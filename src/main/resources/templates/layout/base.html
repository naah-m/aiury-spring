<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="base(pageTitle, activePage, content)">
<head th:replace="~{fragments/head :: head(${pageTitle})}">
    <title>Aiury</title>
</head>
<body class="app-body d-flex flex-column min-vh-100">
<header th:replace="~{fragments/navbar :: navbar(${activePage})}"></header>

<main class="flex-fill py-4 py-lg-5">
    <div class="container">
        <th:block th:replace="${content}"></th:block>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
