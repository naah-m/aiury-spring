spring.datasource.url=${TEST_DB_URL:${DB_URL:}}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=${TEST_DB_USERNAME:${DB_USERNAME:}}
spring.datasource.password=${TEST_DB_PASSWORD:${DB_PASSWORD:}}
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/oracle
